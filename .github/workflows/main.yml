name: Deploy React Website
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- ΑΥΤΟ ΕΙΝΑΙ ΤΟ ΚΡΙΣΙΜΟ ΒΗΜΑ ΠΟΥ ΛΕΙΠΕΙ ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Θα χρησιμοποιήσει την τελευταία σταθερή έκδοση 22
          cache: 'npm'  # Προαιρετικό: κάνει το install πιο γρήγορο

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Copy Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/thebeamers"
          strip_components: 1
